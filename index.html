<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Key</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      background: #2d6cdf;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      background: #2d6cdf;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<header>
  <h1>Job Key</h1>
  <p>Jobs & Internships Platform</p>
</header>

<div class="container">

  <button onclick="show('all')">All</button>
  <button onclick="show('jobs')">Jobs</button>
  <button onclick="show('internships')">Internships</button>

  <!-- JOBS -->
  <div id="jobs">

    <div class="card">
      <h3>Marketing Manager</h3>
      <p>Company: XYZ Ltd</p>
    </div>

    <div class="card">
      <h3>Software Engineer</h3>
      <p>Company: Tech Corp</p>
    </div>

  </div>

  <!-- INTERNSHIPS -->
  <div id="internships">

    <div class="card">
      <h3>Marketing Intern</h3>
      <p>Company: ABC Agency</p>
    </div>

    <div class="card">
      <h3>HR Intern</h3>
      <p>Company: People Co</p>
    </div>

  </div>

</div>

<script>
  function show(type) {
    document.getElementById('jobs').style.display =
      (type === 'jobs' || type === 'all') ? 'block' : 'none';

    document.getElementById('internships').style.display =
      (type === 'internships' || type === 'all') ? 'block' : 'none';
  }

  // default view
  show('all');
</script>

</body>
</html>
